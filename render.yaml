services:
  # Unified Backend (Node.js - handles everything)
  - type: web
    name: nayepankh-api
    runtime: node
    rootDir: backend/node-gateway
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "*"
      - key: DB_PATH
        value: ./data/app.db

  # React Frontend (Static Site)
  - type: web
    name: nayepankh-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
